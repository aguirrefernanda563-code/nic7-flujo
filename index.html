<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CASH CLASH ⚡ Ruta del Tesorero · NIC 7</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Space+Mono:wght@400;700&family=Spline+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070d18;--bg2:#0c1426;--panel:#101a30;--line:#22335a;--ink:#eaf1ff;--muted:#7d8db0;
    --cyan:#2ff3ff;--lime:#a6ff3d;--magenta:#ff4d8d;--gold:#ffd23f;--violet:#9b6bff;--red:#ff5470;
    --green-bg:#0d2e22;--red-bg:#33121d;--radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Spline Sans',sans-serif;color:var(--ink);min-height:100vh;
    background:
      radial-gradient(900px 500px at 90% -5%, rgba(47,243,255,.12), transparent 60%),
      radial-gradient(800px 500px at 0% 100%, rgba(255,77,141,.12), transparent 55%),
      radial-gradient(700px 400px at 50% 50%, rgba(155,107,255,.06), transparent 60%),
      var(--bg);
    display:flex;justify-content:center;align-items:flex-start;padding:22px 14px 60px;overflow-x:hidden;
  }
  .wrap{width:100%;max-width:780px}

  .hud{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{width:48px;height:48px;border-radius:14px;flex:none;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--cyan),var(--violet));color:#04101f;
    font-family:'Bricolage Grotesque';font-weight:800;font-size:24px;box-shadow:0 0 22px -4px var(--cyan)}
  .brand h1{font-family:'Bricolage Grotesque';font-weight:800;font-size:21px;letter-spacing:-.5px;line-height:1}
  .brand h1 span{color:var(--cyan)}
  .brand small{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
  .hud-right{display:flex;gap:9px;align-items:center}
  .chip{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:7px 12px;text-align:center;min-width:60px}
  .chip .k{font-family:'Space Mono';font-weight:700;font-size:17px;line-height:1}
  .chip .l{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-top:3px}
  .chip.time .k{color:var(--gold)} .chip.score .k{color:var(--lime)}
  .chip.lives .k{font-size:13px;letter-spacing:1px}
  .chip.lives.danger,.chip.time.warn{border-color:var(--red);animation:pulseR 1s infinite}
  .chip.time.warn .k{color:var(--red)}
  @keyframes pulseR{0%,100%{box-shadow:0 0 0 0 rgba(255,84,112,.4)}50%{box-shadow:0 0 0 6px rgba(255,84,112,0)}}
  .mute{background:var(--panel);border:1px solid var(--line);border-radius:12px;width:38px;height:38px;cursor:pointer;color:var(--ink);font-size:16px}

  /* stepper de estaciones */
  .stepper{display:flex;gap:8px;margin-bottom:14px}
  .step{flex:1;display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);
    border-radius:11px;padding:8px 11px;font-size:11.5px;color:var(--muted);font-weight:600;opacity:.55;transition:.25s}
  .step .n{width:20px;height:20px;border-radius:50%;flex:none;display:grid;place-items:center;background:#0a1426;
    font-family:'Space Mono';font-weight:700;font-size:11px}
  .step.active{opacity:1;border-color:var(--cyan);color:var(--ink)}
  .step.active .n{background:var(--cyan);color:#04101f}
  .step.done{opacity:1;border-color:var(--lime);color:var(--lime)}
  .step.done .n{background:var(--lime);color:#04101f}
  @media(max-width:560px){.step .label{display:none}.step{justify-content:center}}

  .combo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:12px;height:24px;
    font-family:'Bricolage Grotesque';font-weight:800;font-size:14px;opacity:0;transition:opacity .2s}
  .combo.show{opacity:1}
  .combo .mult{color:var(--gold);text-shadow:0 0 14px rgba(255,210,63,.6)}
  .combo .bar{flex:1;max-width:150px;height:6px;background:#0a1426;border-radius:99px;overflow:hidden}
  .combo .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--lime),var(--cyan));border-radius:99px;transition:width .25s}

  .card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);
    border-radius:var(--radius);padding:26px 24px;position:relative;overflow:hidden;box-shadow:0 30px 70px -28px #000}
  .card.trapmode{border-color:var(--magenta);box-shadow:0 0 0 1px var(--magenta),0 0 50px -10px rgba(255,77,141,.5)}
  .card::after{content:"";position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(rgba(255,255,255,.022) 1px,transparent 1px);background-size:20px 20px}
  .card>*{position:relative;z-index:1}

  .qtimer{height:7px;background:#0a1426;border-radius:99px;overflow:hidden;margin-bottom:18px}
  .qtimer i{display:block;height:100%;width:100%;background:linear-gradient(90deg,var(--cyan),var(--lime));border-radius:99px}
  .qtimer .lbl-mini{position:absolute}

  .tag{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.3px;padding:5px 12px;border-radius:99px;margin-bottom:14px}
  .tag.cls{color:var(--cyan);background:rgba(47,243,255,.1);border:1px solid rgba(47,243,255,.3)}
  .tag.adj{color:var(--lime);background:rgba(166,255,61,.1);border:1px solid rgba(166,255,61,.3)}
  .tag.bld{color:var(--violet);background:rgba(155,107,255,.12);border:1px solid rgba(155,107,255,.35)}
  .tag.trap{color:var(--magenta);background:rgba(255,77,141,.12);border:1px solid rgba(255,77,141,.4);animation:wob 1.4s infinite}
  @keyframes wob{0%,100%{transform:rotate(-1.5deg)}50%{transform:rotate(1.5deg)}}

  h2.q{font-family:'Bricolage Grotesque';font-weight:700;font-size:22px;line-height:1.18;letter-spacing:-.4px;margin-bottom:5px}
  .q-sub{color:var(--muted);font-size:13.5px;margin-bottom:18px}

  .item{background:#0a1325;border:1px dashed var(--line);border-radius:14px;padding:18px 20px;margin-bottom:18px;text-align:center}
  .item .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:1.6px;color:var(--muted);margin-bottom:7px}
  .item .txt{font-family:'Bricolage Grotesque';font-size:21px;font-weight:700;line-height:1.25}
  .item.trap{border-color:var(--magenta);background:#1d0e1a}

  .opts{display:grid;gap:10px}
  .opts.g3{grid-template-columns:1fr 1fr 1fr} .opts.g4{grid-template-columns:1fr 1fr} .opts.g2{grid-template-columns:1fr 1fr}
  @media(max-width:560px){.opts.g3,.opts.g4,.opts.g2{grid-template-columns:1fr}}
  .opt{appearance:none;border:1px solid var(--line);background:var(--panel);color:var(--ink);
    font-family:'Spline Sans';font-weight:700;font-size:14.5px;padding:15px 12px;border-radius:13px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:4px;line-height:1.2;transition:transform .1s,border-color .15s,background .15s}
  .opt .em{font-size:21px} .opt small{font-weight:400;color:var(--muted);font-size:11px}
  .opt:hover:not(:disabled){transform:translateY(-3px);border-color:var(--cyan)}
  .opt:disabled{cursor:default}
  .opt.ok{background:var(--green-bg);border-color:var(--lime);box-shadow:0 0 0 1px var(--lime) inset}
  .opt.no{background:var(--red-bg);border-color:var(--red);box-shadow:0 0 0 1px var(--red) inset}
  .opt.dim{opacity:.35}

  .fb{margin-top:16px;border-radius:13px;padding:14px 16px;display:none;border:1px solid;animation:rise .3s both}
  .fb.show{display:block}
  .fb.y{background:var(--green-bg);border-color:rgba(166,255,61,.4)} .fb.n{background:var(--red-bg);border-color:rgba(255,84,112,.4)}
  .fb .ft{font-weight:800;font-size:14.5px;margin-bottom:4px;display:flex;align-items:center;gap:7px;font-family:'Bricolage Grotesque'}
  .fb.y .ft{color:var(--lime)} .fb.n .ft{color:var(--red)}
  .fb p{font-size:13px;color:#c5d2ec;line-height:1.5} .fb b{color:var(--gold)}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  .btn{appearance:none;border:none;cursor:pointer;font-family:'Bricolage Grotesque';font-weight:800;font-size:15px;
    padding:14px 24px;border-radius:13px;letter-spacing:.2px;color:#04101f;
    background:linear-gradient(135deg,var(--cyan),var(--lime));transition:transform .1s,filter .15s}
  .btn:hover{transform:translateY(-2px);filter:brightness(1.08)}
  .btn.full{width:100%;justify-content:center;text-align:center}
  .btn.alt{background:linear-gradient(135deg,var(--violet),var(--magenta));color:#fff}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
  .btn:disabled{opacity:.45;cursor:default;transform:none}
  .row{display:flex;justify-content:flex-end;margin-top:18px}

  .float{position:fixed;font-family:'Bricolage Grotesque';font-weight:800;font-size:28px;pointer-events:none;z-index:99;animation:fly 1s ease-out forwards}
  @keyframes fly{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.3)}}

  /* construir flujo (estación 3) */
  .build-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid #16213c}
  .build-row .d{font-size:13.5px}
  .build-row .amt{font-family:'Space Mono';font-size:13px;color:var(--muted)}
  .signs{display:flex;gap:7px}
  .sgn{width:40px;height:40px;border-radius:10px;border:1px solid var(--line);background:var(--panel);color:var(--ink);font-size:19px;font-weight:700;cursor:pointer;transition:.15s}
  .sgn:hover{border-color:var(--cyan)}
  .sgn.selp{background:var(--green-bg);border-color:var(--lime);color:var(--lime)}
  .sgn.selm{background:var(--red-bg);border-color:var(--red);color:var(--red)}
  .sgn:disabled{cursor:default}
  .runtot{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:14px;border-top:2px solid var(--line)}
  .runtot .l{font-family:'Bricolage Grotesque';font-weight:700;font-size:16px}
  .runtot .v{font-family:'Space Mono';font-weight:700;font-size:21px;color:var(--gold)}
  .casehead{display:flex;align-items:center;justify-content:space-between;font-size:14px;margin-bottom:8px}
  .casehead .ut{font-family:'Space Mono';color:var(--gold);font-weight:700}

  /* pantallas */
  .hero{text-align:center;padding:6px 4px}
  .hero .kick{font-size:11.5px;letter-spacing:2px;text-transform:uppercase;color:var(--magenta);margin-bottom:12px;font-weight:700}
  .hero h2{font-family:'Bricolage Grotesque';font-weight:800;font-size:38px;line-height:.98;letter-spacing:-1.2px;margin-bottom:13px}
  .hero h2 .g{background:linear-gradient(120deg,var(--cyan),var(--lime),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero p{color:var(--muted);font-size:14.5px;max-width:500px;margin:0 auto 8px;line-height:1.55}
  .route{display:grid;gap:10px;margin:20px 0;text-align:left}
  .rstep{background:#0a1325;border:1px solid var(--line);border-radius:13px;padding:13px 15px;display:flex;gap:13px;align-items:center}
  .rstep .num{width:34px;height:34px;border-radius:10px;flex:none;display:grid;place-items:center;font-family:'Bricolage Grotesque';font-weight:800;font-size:16px}
  .rstep:nth-child(1) .num{background:rgba(47,243,255,.15);color:var(--cyan)}
  .rstep:nth-child(2) .num{background:rgba(166,255,61,.15);color:var(--lime)}
  .rstep:nth-child(3) .num{background:rgba(155,107,255,.18);color:var(--violet)}
  .rstep h4{font-size:14.5px;margin-bottom:2px;font-family:'Bricolage Grotesque'}
  .rstep p{font-size:12.5px;color:var(--muted);margin:0;text-align:left;line-height:1.4}
  .rstep .tm{margin-left:auto;font-family:'Space Mono';font-size:12px;color:var(--gold);flex:none}
  .minirules{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:6px 0 4px}
  .mr{font-size:11.5px;color:var(--muted);background:#0a1325;border:1px solid var(--line);border-radius:99px;padding:5px 11px}
  .namewrap{margin:14px 0 4px}
  .namewrap label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
  .nameInput{width:100%;max-width:320px;background:#0a1325;border:1px solid var(--line);border-radius:12px;
    padding:13px 16px;color:var(--ink);font-family:'Spline Sans';font-size:16px;text-align:center;outline:none}
  .nameInput:focus{border-color:var(--cyan)}
  .bigicon{font-size:64px;line-height:1;margin-bottom:6px}

  .chest{text-align:center;padding:16px 4px}
  .chest .icn{font-size:70px;margin-bottom:6px;animation:bob 1.2s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-10px) rotate(3deg)}}
  .chest h3{font-family:'Bricolage Grotesque';font-weight:800;font-size:24px;margin-bottom:6px}

  .podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin:20px 0}
  .col{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;max-width:120px}
  .col .nm{font-size:12px;font-weight:700;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .col .sc{font-family:'Space Mono';font-size:12px;color:var(--muted)}
  .bar3{width:100%;border-radius:10px 10px 0 0;display:grid;place-items:center;font-size:26px;padding-top:8px}
  .b1{height:92px;background:linear-gradient(180deg,var(--gold),#b88a17)}
  .b2{height:70px;background:linear-gradient(180deg,#cfd8ea,#8893ad)}
  .b3{height:54px;background:linear-gradient(180deg,#e8a06b,#a8633a)}
  .lb{border:1px solid var(--line);border-radius:13px;overflow:hidden}
  .lb-row{display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:13.5px;border-bottom:1px solid #16213c}
  .lb-row:last-child{border-bottom:none} .lb-row.me{background:rgba(166,255,61,.08)}
  .lb-row .rk{font-family:'Space Mono';font-weight:700;color:var(--muted);width:26px}
  .lb-row .nm{flex:1;font-weight:600} .lb-row .sc{font-family:'Space Mono';font-weight:700;color:var(--lime)}
  .end-grid{display:flex;gap:10px;justify-content:center;margin:14px 0}
  .end-grid .s{background:#0a1325;border:1px solid var(--line);border-radius:12px;padding:11px 16px}
  .end-grid .v{font-family:'Space Mono';font-weight:700;font-size:21px;color:var(--cyan)}
  .end-grid .l{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-top:2px}

  .foot{text-align:center;margin-top:16px;font-size:11px;color:#3f5274} .foot b{color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <div class="hud">
    <div class="brand">
      <div class="logo">¢</div>
      <div><h1>CASH <span>CLASH</span></h1><small>Ruta del Tesorero · NIC 7</small></div>
    </div>
    <div class="hud-right" id="hudR" style="display:none">
      <div class="chip time" id="timeChip"><div class="k" id="timeV">5:00</div><div class="l">Estación</div></div>
      <div class="chip score"><div class="k" id="scoreV">0</div><div class="l">Puntos</div></div>
      <div class="chip lives" id="livesChip"><div class="k" id="livesV">❤️❤️❤️❤️❤️</div><div class="l">Vidas</div></div>
      <button class="mute" id="muteBtn" title="Sonido">🔊</button>
    </div>
  </div>

  <div class="stepper" id="stepper" style="display:none">
    <div class="step" id="st1"><span class="n">1</span><span class="label">Actividades</span></div>
    <div class="step" id="st2"><span class="n">2</span><span class="label">Suma / Resta</span></div>
    <div class="step" id="st3"><span class="n">3</span><span class="label">Armar flujo</span></div>
  </div>

  <div class="combo" id="combo">
    <span class="mult" id="multV">x2</span>
    <span class="bar"><i id="comboBar" style="width:0%"></i></span>
    <span style="color:var(--muted);font-size:12px" id="comboTxt">RACHA</span>
  </div>

  <div class="card" id="card"></div>
  <div class="foot">3 estaciones · 5 min c/u · <b>NIC 7 — método indirecto</b> · ¡llega al podio sin perder tus vidas!</div>
</div>

<script>
/* ===================== AUDIO ===================== */
let muted=false,actx=null;
function beep(f,d,t,v){if(muted)return;try{actx=actx||new(window.AudioContext||window.webkitAudioContext)();
  const o=actx.createOscillator(),g=actx.createGain();o.type=t||'sine';o.frequency.value=f;
  g.gain.value=v||.06;o.connect(g);g.connect(actx.destination);o.start();
  g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+(d||.15));o.stop(actx.currentTime+(d||.15));}catch(e){}}
const sfx={
  good(){beep(660,.1,'triangle',.06);setTimeout(()=>beep(990,.12,'triangle',.06),90)},
  bad(){beep(180,.25,'sawtooth',.05)},
  trap(){beep(140,.18,'square',.05);setTimeout(()=>beep(110,.22,'square',.05),140)},
  chest(){beep(523,.1,'sine',.06);setTimeout(()=>beep(784,.1,'sine',.06),100);setTimeout(()=>beep(1046,.16,'sine',.06),200)},
  tick(){beep(440,.05,'sine',.03)},
  level(){beep(523,.1,'triangle',.06);setTimeout(()=>beep(659,.1,'triangle',.06),110);setTimeout(()=>beep(784,.14,'triangle',.06),220)},
  end(){beep(523,.12,'triangle',.06);setTimeout(()=>beep(659,.12,'triangle',.06),130);setTimeout(()=>beep(880,.2,'triangle',.06),260)}
};

/* ===================== BANCO ===================== */
const BANK=[
  // Estación 1 · Clasificación (cls)  OP / INV / FIN
  {ty:'cls',t:"Cobro a clientes por ventas",a:"OP",e:"Actividad principal del negocio &rarr; <b>Operación</b>."},
  {ty:'cls',t:"Pago de sueldos al personal",a:"OP",e:"Gasto operativo normal &rarr; <b>Operación</b>."},
  {ty:'cls',t:"Pago a proveedores de mercadería",a:"OP",e:"Parte del giro del negocio &rarr; <b>Operación</b>."},
  {ty:'cls',t:"Pago de servicios básicos (luz, agua)",a:"OP",e:"Gasto operativo del día a día &rarr; <b>Operación</b>."},
  {ty:'cls',t:"Compra de maquinaria para producir",a:"INV",e:"Adquirir propiedad, planta y equipo &rarr; <b>Inversión</b>."},
  {ty:'cls',t:"Compra de un vehículo para la empresa",a:"INV",e:"Activo de largo plazo &rarr; <b>Inversión</b>."},
  {ty:'cls',t:"Venta de un terreno en desuso",a:"INV",e:"Vender un activo de largo plazo &rarr; <b>Inversión</b>."},
  {ty:'cls',t:"Venta de un equipo usado",a:"INV",e:"Cobro por un activo de largo plazo &rarr; <b>Inversión</b>."},
  {ty:'cls',t:"Obtención de un préstamo bancario",a:"FIN",e:"Financiamiento de terceros &rarr; <b>Financiación</b>."},
  {ty:'cls',t:"Pago (abono al capital) de un préstamo",a:"FIN",e:"Devolver el principal de la deuda &rarr; <b>Financiación</b>."},
  {ty:'cls',t:"Pago de dividendos a los dueños",a:"FIN",e:"Retribuye a los dueños del capital &rarr; <b>Financiación</b>."},
  {ty:'cls',t:"Compra de mercadería (inventario) al contado",a:"OP",trap:true,e:"¡Trampa! El inventario es parte del ciclo del negocio &rarr; <b>Operación</b>, NO Inversión."},
  {ty:'cls',t:"Pago del impuesto a la renta",a:"OP",trap:true,e:"Impuestos sobre ganancias &rarr; <b>Operación</b>, salvo asociación clara a inversión/financiación."},

  // Estación 2 · Ajustes (adj)  + suma / − resta
  {ty:'adj',t:"Depreciación del ejercicio",a:"+",e:"Gasto que no usó efectivo &rarr; se <b>suma</b>."},
  {ty:'adj',t:"Amortización de intangibles",a:"+",e:"Gasto no monetario &rarr; se <b>suma</b>."},
  {ty:'adj',t:"Aumento en cuentas por cobrar",a:"-",e:"Vendiste pero no cobraste &rarr; se <b>resta</b>."},
  {ty:'adj',t:"Disminución de cuentas por cobrar",a:"+",e:"Cobraste a clientes: entró efectivo &rarr; se <b>suma</b>."},
  {ty:'adj',t:"Disminución de inventarios",a:"+",e:"Inventario vuelto efectivo &rarr; se <b>suma</b>."},
  {ty:'adj',t:"Aumento de inventarios",a:"-",e:"Compraste inventario: salió efectivo &rarr; se <b>resta</b>."},
  {ty:'adj',t:"Aumento en cuentas por pagar",a:"+",e:"Retienes efectivo no pagado &rarr; se <b>suma</b>."},

function reset(){S={screen:'start',name:'',score:0,lives:MAX_LIVES,combo:0,maxCombo:0,
  station:1,stTime:ST_TIME,answered:0,correct:0,stAns:0,stCor:0,
  queue:[],qi:0,current:null,picks:[],caseData:null,_chest:false};}
function mult(){if(S.combo>=9)return 3;if(S.combo>=6)return 2;if(S.combo>=3)return 1.5;return 1;}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function money(n){return '$'+n.toLocaleString('es-EC')}
function fmtTime(s){const m=Math.floor(s/60),x=s%60;return m+":"+String(x).padStart(2,'0')}

/* ===================== HUD ===================== */
function updHUD(){
  document.getElementById('timeV').textContent=fmtTime(S.stTime);
  document.getElementById('scoreV').textContent=S.score;
  document.getElementById('timeChip').classList.toggle('warn',S.stTime<=60);
  document.getElementById('livesV').textContent='❤️'.repeat(S.lives)+'🖤'.repeat(MAX_LIVES-S.lives);
  document.getElementById('livesChip').classList.toggle('danger',S.lives<=1);
  const c=document.getElementById('combo');
  if(S.combo>=3){c.classList.add('show');document.getElementById('multV').textContent='x'+mult();
    document.getElementById('comboTxt').textContent='RACHA '+S.combo;
    document.getElementById('comboBar').style.width=(S.combo>=9?100:(S.combo%3)/3*100)+'%';
  }else c.classList.remove('show');
}
function updStepper(){
  [1,2,3].forEach(n=>{const el=document.getElementById('st'+n);el.className='step';
    if(n<S.station)el.classList.add('done');if(n===S.station)el.classList.add('active');});
}

    updHUD();

}

function beginStation(n){

/* ===================== ESTACIONES 1 y 2 ===================== */
function nextQuestion(){
  if(S.stAns>0 && S.stAns%5===0 && !S._chest && S.qi<S.queue.length){S._chest=true;return renderChest();}
  S._chest=false;
  if(S.qi>=S.queue.length){ return stationComplete(); } // se respondieron las 8 preguntas
  S.current=S.queue[S.qi++];renderQuestion();
}
function renderQuestion(){
  const q=S.current,trap=!!q.trap,isCls=q.ty==='cls';
  card.classList.toggle('trapmode',trap);
  let tag=trap?`<span class="tag trap">☠️ Trampa · vale DOBLE</span>`
    :(isCls?`<span class="tag cls">📂 Estación 1 · Actividades</span>`:`<span class="tag adj">➕➖ Estación 2 · Ajustes</span>`);
  let heading,sub,opts;
  if(isCls){
    heading="¿En qué sección del flujo va?";sub="Operación, Inversión, Financiación… o ninguna.";
    opts=`<div class="opts ${q.o4?'g4':'g3'}" id="opts">
      <button class="opt" data-v="OP" onclick="answer('OP')"><span class="em">⚙️</span>Operación</button>
      <button class="opt" data-v="INV" onclick="answer('INV')"><span class="em">🏭</span>Inversión</button>
      <button class="opt" data-v="FIN" onclick="answer('FIN')"><span class="em">🏦</span>Financiación</button>
      ${q.o4?`<button class="opt" data-v="NM" onclick="answer('NM')"><span class="em">🚫</span>No es flujo<small>no monetaria</small></button>`:''}
    </div>`;
  }else{
    heading="Partiendo de la utilidad neta…";sub="¿Esta partida se SUMA o se RESTA?";
    opts=`<div class="opts g2" id="opts">
      <button class="opt" data-v="+" onclick="answer('+')"><span class="em">➕</span>Se SUMA</button>
      <button class="opt" data-v="-" onclick="answer('-')"><span class="em">➖</span>Se RESTA</button>
    </div>`;
  }
  card.innerHTML=`
    <div class="qtimer"><i id="qbar"></i></div>
    ${tag}
    <h2 class="q">${heading}</h2><p class="q-sub">${sub}</p>
    <div class="item ${trap?'trap':''}"><div class="lbl">Partida</div><div class="txt">${q.t}</div></div>
    ${opts}
    <div class="fb" id="fb"></div>
    <div class="row" id="row" style="display:none"><button class="btn" id="nextBtn">Siguiente ▸</button></div>`;
  startBonusBar();
}
function startBonusBar(){
  const bar=document.getElementById('qbar');
  qDeadline=Date.now()+BONUS_WIN*1000;
  bar.style.transition='none';bar.style.width='100%';void bar.offsetWidth;
  bar.style.transition=`width ${BONUS_WIN}s linear`;bar.style.width='0%';
}
function bonusFrac(){return Math.max(0,(qDeadline-Date.now())/(BONUS_WIN*1000))}

function answer(val){
  const q=S.current,trap=!!q.trap,ok=q.a===val;
  S.answered++;S.stAns++;
  document.querySelectorAll('#opts .opt').forEach(b=>{b.disabled=true;
    if(b.dataset.v===q.a)b.classList.add('ok');
    if(b.dataset.v===val&&!ok)b.classList.add('no');
    if(b.dataset.v!==q.a&&b.dataset.v!==val)b.classList.add('dim');});
  const fb=document.getElementById('fb');
  const nice={OP:'Operación',INV:'Inversión',FIN:'Financiación',NM:'No es flujo (no monetaria)','+':'Se suma (+)','-':'Se resta (−)'}[q.a];
  if(ok){
    S.combo++;S.correct++;S.stCor++;S.maxCombo=Math.max(S.maxCombo,S.combo);
    const speed=Math.round(bonusFrac()*8);let pts=(10+speed);if(trap)pts*=2;pts=Math.round(pts*mult());
    S.score+=pts;trap?sfx.trap():sfx.good();floatText('+'+pts,true);
    fb.className='fb y show';
    fb.innerHTML=`<div class="ft">✓ ¡Correcto! ${trap?'☠️ DOBLE · ':''}+${pts} pts ${mult()>1?'· x'+mult()+' racha':''}</div><p>${q.e}</p>`;
  }else{
    S.combo=0;const lifePen=trap?2:1;S.stTime=Math.max(0,S.stTime-(trap?10:5));S.lives=Math.max(0,S.lives-lifePen);
    sfx.bad();floatText('−'+lifePen+'❤️',false);
    fb.className='fb n show';
    fb.innerHTML=`<div class="ft">✗ ¡Caíste! −${lifePen} vida${lifePen>1?'s':''} · respuesta: <b>${nice}</b></div><p>${q.e}</p>`;
  }
  updHUD();
  if(S.lives<=0){clearInterval(stTimer);return setTimeout(()=>endGame('defeat'),650);}
  const row=document.getElementById('row');row.style.display='flex';
  document.getElementById('nextBtn').onclick=()=>nextQuestion();
}

/* ===================== COFRE ===================== */
function renderChest(){
  card.classList.remove('trapmode');paused=false; // el reloj sigue corriendo
  card.innerHTML=`<div class="chest"><div class="icn">🎁</div><h3>¡Cofre sorpresa!</h3>
    <p style="color:var(--muted);font-size:14px;max-width:380px;margin:0 auto 4px">No todos los cofres son lo que parecen 😈</p>
    <div style="margin-top:18px"><button class="btn alt full" id="openChest">🔓 Abrir cofre</button></div></div>`;
  document.getElementById('openChest').onclick=openChest;
}
function openChest(){
  const rolls=[
    {type:'pts',v:40,txt:'💰 +40 puntos'},{type:'pts',v:60,txt:'💎 +60 puntos'},
    {type:'time',v:15,txt:'⏱️ +15 s a la estación'},{type:'time',v:20,txt:'⏱️ +20 s a la estación'},
    {type:'life',v:1,txt:'❤️ +1 vida recuperada'},{type:'pts',v:50,txt:'⭐ +50 puntos'},
    {type:'mt',v:12,txt:'😈 ¡Cofre falso! −12 s'},{type:'ml',v:1,txt:'😈 ¡Trampa! pierdes 1 vida'},
  ];
  const r=rolls[Math.floor(Math.random()*rolls.length)];
  if(r.type==='pts')S.score+=r.v;else if(r.type==='time')S.stTime+=r.v;
  else if(r.type==='life')S.lives=Math.min(MAX_LIVES,S.lives+r.v);
  else if(r.type==='mt')S.stTime=Math.max(1,S.stTime-r.v);
  else if(r.type==='ml')S.lives=Math.max(0,S.lives-r.v);
  (r.type==='mt'||r.type==='ml')?sfx.trap():sfx.chest();updHUD();
  if(S.lives<=0){clearInterval(stTimer);card.innerHTML=`<div class="chest"><div class="icn">💥</div><h3 style="color:var(--magenta)">${r.txt}</h3></div>`;return setTimeout(()=>endGame('defeat'),900);}
  const good=r.type!=='mt'&&r.type!=='ml';
  card.innerHTML=`<div class="chest"><div class="icn">${good?'✨':'💥'}</div>
    <h3 style="color:${good?'var(--lime)':'var(--magenta)'}">${r.txt}</h3>
    <div style="margin-top:18px"><button class="btn full" onclick="nextQuestion()">Continuar ▸</button></div></div>`;
}

/* ===================== ESTACIÓN 3 · ARMAR EL FLUJO COMPLETO ===================== */
const SECT_META={OP:{icon:'⚙️',color:'var(--cyan)',sub:'Flujo de operación'},
                 INV:{icon:'🏭',color:'var(--violet)',sub:'Flujo de inversión'},
                 FIN:{icon:'🏦',color:'var(--gold)',sub:'Flujo de financiación'}};
function startFlow(){
  S.flowPicks=FULL_FLOW.sections.map(s=>s.lines.map(()=>null));
  renderFlow();
}
function flowTotals(useCorrect){
  let subs=[],grand=0;
  FULL_FLOW.sections.forEach((s,si)=>{
    let sub=s.start;
    s.lines.forEach((ln,li)=>{
      const sg=useCorrect?ln.sign:S.flowPicks[si][li];
      if(sg==='+')sub+=ln.amt;else if(sg==='-')sub-=ln.amt;
    });
    subs[si]=sub;grand+=sub;
  });
  return {subs,grand};
}
function renderFlow(){
  card.classList.remove('trapmode');
  let html='';
  FULL_FLOW.sections.forEach((s,si)=>{
    const m=SECT_META[s.key];
    html+=`<div style="margin:16px 0 2px;font-family:'Bricolage Grotesque';font-weight:700;font-size:15px;color:${m.color}">${m.icon} ${s.title} <span style="font-size:11px;color:var(--muted);font-weight:400">· ${s.hint}</span></div>`;
    if(s.startLabel){
      html+=`<div class="build-row"><div class="d"><b>${s.startLabel}</b></div><div class="amt" style="color:var(--gold)">${money(s.start)}</div></div>`;
    }
    s.lines.forEach((ln,li)=>{
      html+=`<div class="build-row"><div class="d">${ln.d}</div>
        <div style="display:flex;align-items:center;gap:12px"><span class="amt">${money(ln.amt)}</span>
          <div class="signs">
            <button class="sgn" id="p${si}_${li}" onclick="pickFlow(${si},${li},'+')">+</button>
            <button class="sgn" id="m${si}_${li}" onclick="pickFlow(${si},${li},'-')">−</button>
          </div></div></div>`;
    });
    html+=`<div class="build-row" style="border-top:1px solid var(--line)"><div class="d" style="font-weight:700">${m.sub}</div><div class="amt" id="sub${si}" style="color:${m.color};font-weight:700">${money(s.start)}</div></div>`;
  });
  card.innerHTML=`
    <span class="tag bld">🧮 Estación 3 · Flujo completo</span>
    <h2 class="q">Arma el Estado de Flujos de Efectivo</h2>
    <p class="q-sub">Elige el signo de cada partida en las tres secciones. Los subtotales y la variación neta se calculan solos.</p>
    ${html}
    <div class="runtot"><span class="l">Variación neta de efectivo</span><span class="v" id="grand">${money(FULL_FLOW.net)}</span></div>
    <div class="fb" id="fb"></div>
    <div class="row"><button class="btn" id="checkBtn" disabled>Verificar flujo ✓</button></div>`;
  document.getElementById('checkBtn').onclick=verifyFlow;
}
function pickFlow(si,li,sg){
  S.flowPicks[si][li]=sg;
  document.getElementById('p'+si+'_'+li).classList.toggle('selp',sg==='+');
  document.getElementById('p'+si+'_'+li).classList.remove('selm');
  document.getElementById('m'+si+'_'+li).classList.toggle('selm',sg==='-');
  document.getElementById('m'+si+'_'+li).classList.remove('selp');
  const {subs,grand}=flowTotals(false);
  subs.forEach((v,i)=>document.getElementById('sub'+i).textContent=money(v));
  document.getElementById('grand').textContent=money(grand);
  const done=S.flowPicks.every(sec=>sec.every(p=>p!==null));
  document.getElementById('checkBtn').disabled=!done;
}
function verifyFlow(){
  let correct=0,totalLines=0;
  FULL_FLOW.sections.forEach((s,si)=>s.lines.forEach((ln,li)=>{
    totalLines++;
    const ok=S.flowPicks[si][li]===ln.sign;if(ok)correct++;
    const p=document.getElementById('p'+si+'_'+li),m=document.getElementById('m'+si+'_'+li);
    p.disabled=true;m.disabled=true;
    const right=ln.sign==='+'?p:m;right.style.boxShadow='0 0 0 2px var(--lime)';right.style.borderColor='var(--lime)';
    if(!ok){const ch=S.flowPicks[si][li]==='+'?p:m;ch.style.boxShadow='0 0 0 2px var(--red)';ch.style.borderColor='var(--red)';}
  }));
  const {subs,grand}=flowTotals(true);
  subs.forEach((v,i)=>document.getElementById('sub'+i).textContent=money(v));
  document.getElementById('grand').textContent=money(grand);
  const all=correct===totalLines;
  S.answered++;if(all)S.correct++;
  let pts=correct*12+(all?60:0);S.score+=pts;
  if(!all){S.lives=Math.max(0,S.lives-1);sfx.bad();}else sfx.level();
  document.getElementById('checkBtn').disabled=true;
  floatText('+'+pts,true);updHUD();
  const fb=document.getElementById('fb');
  fb.className='fb '+(all?'y':'n')+' show';
  fb.innerHTML=`<div class="ft">${all?'✓ ¡Flujo completo correcto!':'✗ Revisa los signos'} +${pts} pts</div>
    <p>Acertaste <b>${correct}/${totalLines}</b> signos. Operación ${money(subs[0])} · Inversión ${money(subs[1])} · Financiación ${money(subs[2])}. <b>Variación neta de efectivo: ${money(grand)}</b>.${all?'':' (Fallar te costó 1 vida.)'}</p>`;
  if(S.lives<=0){clearInterval(stTimer);return setTimeout(()=>endGame('defeat'),800);}
  const row=card.querySelector('.row');
  row.innerHTML=`<button class="btn" onclick="endGame('time')">Finalizar ruta ▸</button>`;
}

/* ===================== ESTACIÓN COMPLETADA ===================== */
function stationComplete(){
  clearInterval(stTimer);paused=true;sfx.level();
  S.lives=Math.min(MAX_LIVES,S.lives+1); // recompensa por avanzar
  const bonus=40;S.score+=bonus;
  const acc=S.stAns?Math.round(S.stCor/S.stAns*100):0;
  updStepper();updHUD();document.getElementById('combo').classList.remove('show');card.classList.remove('trapmode');
  const next=S.station+1;
  card.innerHTML=`
    <div class="hero">
      <div class="bigicon">🏁</div>
      <h2 style="font-size:28px;color:var(--lime)">¡Estación ${S.station} superada!</h2>
      <p>Buen trabajo. Recibes <b style="color:var(--gold)">+${bonus} pts</b> y recuperas <b>❤️ 1 vida</b>.</p>
      <div class="end-grid">
        <div class="s"><div class="v" style="color:var(--lime)">${S.score}</div><div class="l">Puntos</div></div>
        <div class="s"><div class="v">${acc}%</div><div class="l">Aciertos est.</div></div>
        <div class="s"><div class="v">${'❤️'.repeat(S.lives)||'—'}</div><div class="l">Vidas</div></div>
      </div>
      <div style="margin-top:6px"><button class="btn full" onclick="stationIntro(${next})">Siguiente estación ▸</button></div>
    </div>`;
}

/* ===================== UTILIDADES UI ===================== */
function floatText(txt,good){const el=document.createElement('div');el.className='float';el.textContent=txt;
  el.style.color=good?'var(--lime)':'var(--red)';el.style.left=(window.innerWidth/2-20)+'px';
  el.style.top=(window.innerHeight/2-40)+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),1000);}

/* ===================== LEADERBOARD ===================== */
let MEM_LB=[];
function getLB(){try{const r=localStorage.getItem('cashclash_lb');if(r)return JSON.parse(r);}catch(e){}return MEM_LB;}
function saveLB(lb){MEM_LB=lb;try{localStorage.setItem('cashclash_lb',JSON.stringify(lb));}catch(e){}}

/* ===================== FIN ===================== */
function endGame(outcome){
  outcome=outcome||'time';clearInterval(stTimer);S.screen='end';sfx.end();
  document.getElementById('combo').classList.remove('show');card.classList.remove('trapmode');
  let lb=getLB();const entry={name:S.name,score:S.score,date:Date.now()};
  lb.push(entry);lb.sort((a,b)=>b.score-a.score);lb=lb.slice(0,10);saveLB(lb);
  const myRank=lb.findIndex(r=>r===entry)+1, acc=S.answered?Math.round(S.correct/S.answered*100):0;
  const p=lb.slice(0,3);
  const podium=`<div class="podium">
    ${p[1]?`<div class="col"><div class="nm">${esc(p[1].name)}</div><div class="sc">${p[1].score}</div><div class="bar3 b2">🥈</div></div>`:''}
    ${p[0]?`<div class="col"><div class="nm">${esc(p[0].name)}</div><div class="sc">${p[0].score}</div><div class="bar3 b1">🥇</div></div>`:''}
    ${p[2]?`<div class="col"><div class="nm">${esc(p[2].name)}</div><div class="sc">${p[2].score}</div><div class="bar3 b3">🥉</div></div>`:''}</div>`;
  const rows=lb.map((r,i)=>`<div class="lb-row ${r===entry?'me':''}"><span class="rk">${i+1}</span><span class="nm">${esc(r.name)}${r===entry?' (tú)':''}</span><span class="sc">${r.score}</span></div>`).join('');
  let title,emoji,banner;
  if(outcome==='defeat'){
    title="GAME OVER";emoji="💀";
    banner=`<p style="color:#ffb3c1;font-size:13px;max-width:440px;margin:6px auto 0;line-height:1.5">Te quedaste sin vidas en la <b>Estación ${S.station}</b>. Recuerda la regla de signos: <b style="color:var(--gold)">suman</b> los gastos no monetarios y los aumentos de pasivos; <b style="color:var(--gold)">restan</b> los aumentos de activos corrientes y las ganancias en venta. ¡Vuelve por la revancha!</p>`;
  }else{
    banner=`<p style="color:var(--lime);font-size:13px;margin:6px auto 0">🏆 ¡Completaste las 3 estaciones de la ruta!</p>`;
    if(myRank===1){title="¡CAMPEÓN DE LA RUTA!";emoji="👑"}
    else if(S.score>=400){title="¡Maestro tesorero!";emoji="🏆"}
    else if(S.score>=250){title="¡Gran recorrido!";emoji="🌟"}
    else {title="¡Ruta completada!";emoji="💪"}
  }
  card.innerHTML=`
    <div class="hero">
      <div style="font-size:60px;line-height:1">${emoji}</div>
      <h2 style="font-size:30px;margin:6px 0 4px;${outcome==='defeat'?'color:var(--red)':''}">${title}</h2>
      <p style="margin-bottom:2px">${esc(S.name)}, terminaste en el puesto <b style="color:var(--gold)">#${myRank}</b></p>
      ${banner}
      <div class="end-grid">
        <div class="s"><div class="v" style="color:var(--lime)">${S.score}</div><div class="l">Puntos</div></div>
        <div class="s"><div class="v">${acc}%</div><div class="l">Aciertos</div></div>
        <div class="s"><div class="v">x${S.maxCombo}</div><div class="l">Mejor racha</div></div>
      </div>
      ${podium}
      <div style="font-size:11px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin:10px 0 6px">🏅 Tabla de líderes</div>
      <div class="lb" style="max-width:380px;margin:0 auto">${rows}</div>
      <div style="margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn" onclick="startGame()">↻ Revancha</button>
        <button class="btn ghost" onclick="renderStart()">Cambiar jugador</button>
      </div>
    </div>`;
}

document.getElementById('muteBtn').onclick=function(){muted=!muted;this.textContent=muted?'🔇':'🔊';};
reset();renderStart();
</script>
</body>
</html>
